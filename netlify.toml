[build]
  command = "npm install"
  publish = "public"
  functions = "functions"

[build.environment]
  AWS_LAMBDA_JS_RUNTIME = "nodejs18.x"
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/**"]

[functions.server]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
